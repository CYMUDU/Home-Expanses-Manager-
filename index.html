<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home Expense Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div>
        <h1>Home Expense Manager</h1>
        <p id="current-month" class="muted"></p>
      </div>
    </header>

    <section class="card">
      <h2>Add Expense</h2>
      <form id="expense-form" class="form">
        <input type="text" id="item-name" placeholder="Item name" required />
        <input type="date" id="purchase-date" required />
        <input type="number" id="amount" placeholder="Amount" step="0.01" min="0" required />
        <select id="category" required>
          <option value="">Select category</option>
          <option value="Food">Food</option>
          <option value="Utilities">Utilities</option>
          <option value="Healthcare">Healthcare</option>
          <option value="Transport">Transport</option>
          <option value="Education">Education</option>
          <option value="Other">Other</option>
        </select>
        <button type="submit">Add Expense</button>
      </form>
    </section>

    <section class="summary" id="summary">
      <span>Total Spend</span>
      <strong id="total-spend">$0.00</strong>
    </section>

    <section class="filters">
      <select id="filter-category">
        <option value="all">All Categories</option>
        <option value="Food">Food</option>
        <option value="Utilities">Utilities</option>
        <option value="Healthcare">Healthcare</option>
        <option value="Transport">Transport</option>
        <option value="Education">Education</option>
        <option value="Other">Other</option>
      </select>
      <input type="month" id="filter-month" />
    </section>

    <section>
      <h2>Expenses</h2>
      <div id="expense-list" class="expense-list"></div>
    </section>
  </div>

  <script src="app.js" defer></script>
</body>
</html>
